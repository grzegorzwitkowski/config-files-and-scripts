set-window-option -g mode-keys vi
set -g mouse on
set -g history-limit 10000
set -g base-index 1

# Keys
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'catppuccin/tmux'

# Catppuccin
set -g @catppuccin_flavor 'mocha'

# TPM init
run '~/.tmux/plugins/tpm/tpm'
